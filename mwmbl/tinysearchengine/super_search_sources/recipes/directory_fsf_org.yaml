name: directory_fsf_org
domain: directory.fsf.org
field: programming
request:
  url: https://directory.fsf.org/w/api.php
  params:
    action: query
    list: search
    format: json
    srsearch: '{query}'
    srlimit: '{limit}'
response:
  format: json
  results: query.search
  fields:
    title: title
    extract: snippet
    url:
      template: https://directory.fsf.org/wiki/{title}
  strip_html:
  - extract
smoke:
  query: history
  expect_title_contains: history
