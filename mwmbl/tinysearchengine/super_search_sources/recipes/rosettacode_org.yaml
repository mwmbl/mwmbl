name: rosettacode_org
domain: rosettacode.org
field: technology
request:
  url: https://rosettacode.org/w/api.php
  params:
    action: query
    list: search
    format: json
    srsearch: '{query}'
    srlimit: '{limit}'
response:
  format: json
  results: query.search
  fields:
    title: title
    extract: snippet
    url:
      template: https://rosettacode.org/wiki/{title}
  strip_html:
    - extract
smoke:
  query: quicksort
  expect_title_contains: quicksort
