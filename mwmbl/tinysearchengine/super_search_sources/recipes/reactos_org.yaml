name: reactos_org
domain: reactos.org
field: tech
request:
  url: "https://reactos.org/wiki/api.php"
  params:
    action: "query"
    list: "search"
    format: "json"
    srsearch: "{query}"
    srlimit: "{limit}"
response:
  format: json
  results: "query.search"
  fields:
    title: "title"
    url:
      template: "https://reactos.org/wiki/{title}"
    extract: "snippet"
  strip_html:
    - extract
smoke:
  query: "kernel"
  expect_title_contains: "Kernel"
