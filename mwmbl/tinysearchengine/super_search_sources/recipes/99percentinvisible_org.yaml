# 99% Invisible via the WordPress REST API search endpoint.
name: 99percentinvisible_org
domain: 99percentinvisible.org
field: art-design
request:
  url: https://99percentinvisible.org/wp-json/wp/v2/search
  params:
    search: "{query}"
    per_page: "{limit}"
response:
  format: json
  results: ""
  fields:
    title: title
    url: url
smoke:
  query: design
  expect_title_contains: design
