# Stratechery via the WordPress REST API posts endpoint.
name: stratechery_com
domain: stratechery.com
field: business-finance
request:
  url: https://stratechery.com/wp-json/wp/v2/posts
  params:
    search: "{query}"
    per_page: "{limit}"
response:
  format: json
  results: ""
  fields:
    title: title.rendered
    extract: excerpt.rendered
    url: link
  strip_html:
    - extract
smoke:
  query: strategy
  expect_title_contains: strategy
