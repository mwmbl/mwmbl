# ProPublica investigative journalism via WordPress REST API.
name: propublica_org
domain: www.propublica.org
field: news-politics
request:
  url: https://www.propublica.org/wp-json/wp/v2/posts
  params:
    search: "{query}"
    per_page: "{limit}"
response:
  format: json
  results: ""
  fields:
    title: title.rendered
    extract: excerpt.rendered
    url: link
  strip_html:
    - extract
smoke:
  query: investigation
  expect_title_contains: investigation
