name: devblogs_microsoft_com
domain: devblogs.microsoft.com
field: programming
request:
  url: https://devblogs.microsoft.com/wp-json/wp/v2/posts
  params:
    search: '{query}'
    per_page: '{limit}'
response:
  format: json
  results: ''
