# TechCrunch via the WordPress REST API posts endpoint.
name: techcrunch_com
domain: techcrunch.com
field: business-finance
request:
  url: https://techcrunch.com/wp-json/wp/v2/posts
  params:
    search: "{query}"
    per_page: "{limit}"
response:
  format: json
  results: ""
  fields:
    title: title.rendered
    extract: excerpt.rendered
    url: link
  strip_html:
    - extract
smoke:
  query: artificial intelligence
  expect_title_contains: AI
