name: www_lrb_co_uk
domain: www.lrb.co.uk
field: books-literature
request:
  url: https://www.lrb.co.uk/search-results
  params:
    search: '{query}'
response:
  format: html
  results: h3
  base_url: https://www.lrb.co.uk
  fields:
    title: a
    url:
      selector: a
      attr: href
smoke:
  query: book
  expect_title_contains: book
