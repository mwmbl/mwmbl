name: wikidata_org
domain: www.wikidata.org
field: other
request:
  url: https://www.wikidata.org/w/api.php
  params:
    action: query
    list: search
    format: json
    srsearch: "{query}"
    srlimit: "{limit}"
response:
  format: json
  results: query.search
  fields:
    title: title
    extract: snippet
    url:
      template: "https://www.wikidata.org/wiki/{title}"
  strip_html:
    - extract
smoke:
  query: science fiction writer
  expect_title_contains: Q
