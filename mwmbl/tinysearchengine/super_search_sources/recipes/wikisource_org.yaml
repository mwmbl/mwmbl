name: wikisource_org
domain: wikisource.org
field: books-literature
request:
  url: https://wikisource.org/w/api.php
  params:
    action: query
    list: search
    format: json
    srsearch: "{query}"
    srlimit: "{limit}"
response:
  format: json
  results: query.search
  fields:
    title: title
    extract: snippet
    url:
      template: "https://wikisource.org/wiki/{title}"
  strip_html:
    - extract
smoke:
  query: frankenstein
  expect_title_contains: Frankenstein
