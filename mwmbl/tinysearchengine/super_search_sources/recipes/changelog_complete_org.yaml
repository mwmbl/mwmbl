name: changelog_complete_org
domain: changelog.complete.org
field: programming
request:
  url: https://changelog.complete.org/wp-json/wp/v2/posts
  params:
    search: "{query}"
    per_page: "{limit}"
response:
  format: json
  results: ""
  fields:
    title: title.rendered
    extract: excerpt.rendered
    url: link
  strip_html:
    - extract
smoke:
  query: debian
  expect_title_contains: Debian
