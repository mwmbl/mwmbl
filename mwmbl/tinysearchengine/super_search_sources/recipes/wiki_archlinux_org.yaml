name: wiki_archlinux_org
domain: wiki.archlinux.org
field: tech
request:
  url: https://wiki.archlinux.org/api.php
  params:
    action: query
    list: search
    format: json
    srsearch: '{query}'
    srlimit: '{limit}'
response:
  format: json
  results: query.search
  fields:
    title: title
    extract: snippet
    url:
      template: https://wiki.archlinux.org/wiki/{title}
  strip_html:
  - extract
smoke:
  query: history
  expect_title_contains: history
