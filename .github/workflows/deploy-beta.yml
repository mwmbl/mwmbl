name: Deploy Beta
on:
  workflow_dispatch: # Manual button trigger
    inputs:
      tag:
        description: 'Image tag to deploy (e.g., beta, pr-42, or a commit SHA)'
        required: true
        default: 'beta'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Host to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H mwmbl.org >> ~/.ssh/known_hosts

      - name: Deploy Beta via SSH
        run: |
          # Use the standard ssh command. 
          # The agent will automatically provide the key.
          ssh dokku@mwmbl.org "git:from-image beta.mwmbl.org ghcr.io/${{ github.repository }}:${{ github.event.inputs.tag }}"
